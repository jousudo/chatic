# Runs on every push and pull request: checks formatting, vet, build, and tests.
# Keeps contributions honest — a PR that doesn't build or is not gofmt-clean fails here.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0" # single static binary, pure-Go SQLite driver
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Verify gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$unformatted"
            echo "Run: gofmt -w ."
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build -o chatic ./cmd/server

      - name: Test
        run: go test ./...
