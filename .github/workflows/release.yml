# Publica uma release ao empurrar uma tag de versão (ex.: git tag v0.1.0 && git push --tags).
# Gera binários (Win/Linux/macOS, amd64+arm64), pacotes .deb/.rpm e a imagem Docker (GHCR).
# Nada é publicado sem uma tag — seguro deixar pronto sem "ligar" ainda.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # criar a GitHub Release
  packages: write # publicar imagem no GHCR

jobs:
  goreleaser:
    name: Binaries & packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser precisa do histórico/tags p/ o changelog

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
